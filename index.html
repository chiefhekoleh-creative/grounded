<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grounded — Top Tier Agency</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0b0c;
  --surface:#121214;
  --text:#eaeaea;
  --muted:#9b9b9b;
  --accent:#f5c518;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);overflow-x:hidden}

nav{
position:fixed;width:100%;display:flex;justify-content:space-between;
align-items:center;padding:20px 40px;z-index:1000;
background:rgba(0,0,0,0.4);backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}

nav a{color:var(--text);text-decoration:none;font-size:14px;opacity:.7}
nav a:hover{opacity:1}
nav ul{display:flex;gap:30px;list-style:none}

.hero{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;text-align:center;
position:relative;overflow:hidden;
}

.hero h1{font-size:4.5rem;font-weight:800}
.hero p{max-width:600px;color:var(--muted);margin:20px 0}

.glow{
position:absolute;width:600px;height:600px;
background:radial-gradient(circle,var(--accent),transparent 60%);
opacity:.15;filter:blur(100px);pointer-events:none;
}

.btn{
background:var(--accent);color:black;padding:14px 26px;
border-radius:10px;text-decoration:none;font-weight:600
}

section{padding:120px 40px;max-width:1200px;margin:auto}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px}

.card{
background:var(--surface);padding:30px;border-radius:18px;
border:1px solid var(--border);transition:.4s;
}
.card:hover{transform:translateY(-8px);border-color:var(--accent)}

.portfolio img{width:100%;border-radius:14px;filter:grayscale(100%);transition:.4s}
.portfolio img:hover{filter:grayscale(0)}

.fade{opacity:0;transform:translateY(40px);transition:1s}
.fade.visible{opacity:1;transform:translateY(0)}

footer{text-align:center;padding:60px;color:var(--muted);border-top:1px solid var(--border)}

@media(max-width:768px){.hero h1{font-size:2.5rem}}
</style>
</head>

<body>

<nav>
<img src="images/logo.png" alt="Grounded Logo" class="logo">
<ul>
<li><a href="#">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#work">Work</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<section class="hero">
<div class="glow" id="glow"></div>
<h1>Designing the Future of Brands</h1>
<p>Rooted in craft. Elevated by impact.</p>
<a href="#contact" class="btn">Start Project</a>
</section>

<section id="services" class="fade">
<h2>Services</h2>
<div class="grid">
<div class="card">Brand Identity</div>
<div class="card">Campaign Design</div>
<div class="card">Packaging</div>
<div class="card">Creative Direction</div>
</div>
</section>

<section id="work" class="fade">
<h2>Case Studies</h2>
<div id="portfolio" class="grid portfolio"></div>
</section>

<section id="contact" class="fade">
<h2>Let’s Work</h2>
<p style="color:var(--muted);margin:20px 0">Have a vision? Let’s build it.</p>
<a href="mailto:youremail@example.com" class="btn">Email Us</a>
</section>

<footer>
<p>© 2026 Grounded</p>
</footer>

<script>
// INTERACTIVE HERO GLOW
const glow = document.getElementById('glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX - 300 + 'px';
  glow.style.top = e.clientY - 300 + 'px';
});

// SCROLL ANIMATIONS
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){entry.target.classList.add('visible')}
  })
});
document.querySelectorAll('.fade').forEach(el => observer.observe(el));

// CMS-LIKE PORTFOLIO
const projects = [
  {title:"Moshoeshoe Walk", img:"images/moshoeshoe.jpg"},
  {title:"GuardRisk Campaign", img:"images/guardrisk.jpg"},
  {title:"Packaging Design", img:"images/packaging.jpg"}
];
  
const container = document.getElementById('portfolio');
projects.forEach(p => {
  const div = document.createElement('div');
  div.innerHTML = `<img src="${p.img}?auto=format&fit=crop&w=600&q=80"><p style="margin-top:10px">${p.title}</p>`;
  container.appendChild(div);
});
</script>

</body>
</html>
